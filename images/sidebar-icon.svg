<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none">

  <!-- Clock legs -->
  <line x1="8" y1="20" x2="6" y2="23" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="20" x2="18" y2="23" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Full circle clock body -->
  <circle cx="12" cy="11" r="9" stroke="currentColor" stroke-width="1.5"/>

  <!-- Dollar sign - slightly larger -->
  <text x="12" y="11"
    font-family="Georgia, serif"
    font-size="11"
    font-weight="900"
    fill="currentColor"
    text-anchor="middle"
    dominant-baseline="central">$</text>

</svg>
